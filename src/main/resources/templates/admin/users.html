<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пользователи — Онлайн библиотека</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="container">
    <div class="top">
        <h1>👥 Пользователи</h1>
        <div class="auth-links">
            <span class="book-count" th:if="${currentUsername != null}">
                👤 <strong th:text="${currentUsername}">user</strong>
                <span th:if="${isAdmin}"> (админ)</span>
            </span>
            <a class="auth-links a" th:href="@{/books}">← К каталогу</a>
            <form th:action="@{/logout}" method="post" style="display:inline; margin:0;">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="action-btn delete" style="padding:10px 20px;">Выйти</button>
            </form>
        </div>
    </div>

    <div th:if="${success}" class="success" th:text="${success}"></div>
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <div class="search-results">
        <p>Всего пользователей: <strong th:text="${#lists.size(users)}">0</strong></p>
    </div>

    <table class="users-table">
        <thead>
            <tr>
                <th>ID</th>
                <th>Логин</th>
                <th>Роль</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="u : ${users}">
                <td th:text="${u.id}">1</td>
                <td>
                    <strong th:text="${u.username}">user</strong>
                    <span th:if="${u.username == currentUsername}" class="me-badge">это вы</span>
                </td>
                <td>
                    <span th:if="${u.role == 'ROLE_ADMIN'}" class="role-badge role-admin">ADMIN</span>
                    <span th:if="${u.role == 'ROLE_USER'}" class="role-badge role-user">USER</span>
                </td>
                <td class="user-actions">
                    <form th:if="${u.username != currentUsername}"
                          th:action="@{'/admin/users/' + ${u.id} + '/toggle-role'}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="action-btn edit"
                                th:text="${u.role == 'ROLE_ADMIN'} ? '⬇ Сделать USER' : '⬆ Сделать ADMIN'">
                        </button>
                    </form>
                    <form th:if="${u.username != currentUsername}"
                          th:action="@{'/admin/users/' + ${u.id} + '/delete'}"
                          method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <button type="submit" class="action-btn delete"
                                onclick="return confirm('Удалить этого пользователя?')">🗑 Удалить</button>
                    </form>
                    <span th:if="${u.username == currentUsername}" style="color:#888;">—</span>
                </td>
            </tr>
        </tbody>
    </table>
</div>
</body>
</html>
